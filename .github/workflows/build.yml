name: Build MTR Optimizer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-native:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: mtr_optimizer.dll
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: libmtr_optimizer.so
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: libmtr_optimizer.dylib
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: libmtr_optimizer.dylib

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Build Rust Native Library
        working-directory: ./native
        run: cargo build --release --target ${{ matrix.target }}

      - name: Upload Native Artifact
        uses: actions/upload-artifact@v4
        with:
          name: native-${{ matrix.target }}
          path: native/target/${{ matrix.target }}/release/${{ matrix.artifact }}

  build-mod:
    runs-on: ubuntu-latest
    needs: build-native
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Download Native Libraries
        uses: actions/download-artifact@v4
        with:
          path: native-downloads/

      - name: Prepare Native Libraries
        run: |
          mkdir -p src/main/resources/native

          # 创建平台子目录并复制原生库
          # 使用通配符和循环确保目录存在且复制正确
          for dir in native-downloads/*/; do
            platform=$(basename "$dir")
            mkdir -p "src/main/resources/native/$platform"
            cp -r "$dir"* "src/main/resources/native/$platform/" || true
          done

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Fabric Jar
        run: ./gradlew build -x buildAllNative

      - name: Upload Mod Artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtr-optimizer-mod
          path: build/libs/*.jar
